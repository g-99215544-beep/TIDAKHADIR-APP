<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laporan Ketidakhadiran Murid - SKSA</title>
<link rel="icon" href="./icon-192.png" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
    min-height: 100vh;
    color: #1f2937;
  }
  header {
    background: linear-gradient(135deg, #15803d 0%, #16a34a 100%);
    color: #fff;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    position: sticky; top: 0; z-index: 10;
  }
  .header-row { display: flex; align-items: center; gap: 12px; max-width: 720px; margin: 0 auto; }
  .header-row img { width: 44px; height: 44px; border-radius: 8px; background: #fff; padding: 2px; }
  .header-text h1 { margin: 0; font-size: 1.05rem; font-weight: 700; }
  .header-text p { margin: 2px 0 0; font-size: .78rem; opacity: .9; }
  main { max-width: 720px; margin: 0 auto; padding: 20px; }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,.06);
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 1.05rem;
    color: #15803d;
    display: flex; align-items: center; gap: 8px;
  }
  label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin: 12px 0 6px; }
  input[type="text"], input[type="date"], select, input[type="file"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    font-size: .95rem;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: #16a34a; background: #fff; }
  .ic-input { font-family: monospace; font-size: 1.1rem !important; letter-spacing: 2px; text-align: center; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 18px;
    border-radius: 999px;
    border: none;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: #16a34a; color: #fff; box-shadow: 0 2px 6px rgba(22,163,74,.3); }
  .btn-primary:hover { background: #15803d; }
  .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; box-shadow: none; }
  .btn-outline { background: #fff; color: #15803d; border: 1px solid #16a34a; }
  .btn-block { display: flex; width: 100%; margin-top: 16px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 12px 0 6px; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-size: .9rem; }
  .date-range { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .alert {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: .85rem;
    margin-top: 10px;
  }
  .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
  .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
  .hint { font-size: .78rem; color: #6b7280; margin-top: 4px; }
  .file-label {
    display: block;
    padding: 14px;
    border: 2px dashed #d1d5db;
    border-radius: 10px;
    background: #f9fafb;
    text-align: center;
    cursor: pointer;
    transition: border-color .1s;
  }
  .file-label:hover { border-color: #16a34a; }
  .file-label.has-file { border-style: solid; border-color: #16a34a; background: #f0fdf4; }
  .file-label input { display: none; }
  .file-name { font-size: .85rem; color: #15803d; font-weight: 600; word-break: break-all; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #15803d; color: #fff;
    padding: 12px 20px; border-radius: 999px;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    font-size: .9rem;
    z-index: 100;
    animation: slideUp .3s ease-out;
  }
  @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .ic-card { max-width: 420px; margin: 40px auto 0; }
  .student-found {
    background: #f0fdf4;
    border: 2px solid #16a34a;
    border-radius: 12px;
    padding: 16px;
    margin-top: 14px;
  }
  .student-found .name { font-size: 1.05rem; font-weight: 700; color: #15803d; }
  .student-found .meta { font-size: .85rem; color: #374151; margin-top: 4px; }
  .pre-info {
    background: #ecfdf5;
    border-left: 4px solid #16a34a;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .hidden { display: none !important; }
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    z-index: 1000;
  }
  .loading-overlay .spinner { width: 32px; height: 32px; border-width: 3px; color: #16a34a; }
  .loading-overlay .msg { color: #15803d; font-size: .9rem; font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <img src="./icon-192.png" alt="SKSA" onerror="this.style.display='none'" />
    <div class="header-text">
      <h1>Laporan Ketidakhadiran</h1>
      <p>SK Sri Aman</p>
    </div>
  </div>
</header>

<!-- Loading overlay (initial load) -->
<div id="initLoading" class="loading-overlay">
  <div class="spinner"></div>
  <div class="msg">Memuatkan...</div>
</div>

<main>
  <!-- IC LOOKUP SCREEN -->
  <div id="icCard" class="card ic-card hidden">
    <h2>🪪 Semak Maklumat Anak</h2>
    <p style="font-size:.85rem;color:#6b7280;margin:0 0 12px;">Sila masukkan nombor IC anak anda untuk teruskan.</p>

    <label for="icInput">No. IC Anak (12 digit, tanpa sengkang)</label>
    <input id="icInput" type="text" inputmode="numeric" maxlength="12" placeholder="010101010101" class="ic-input" autocomplete="off" />

    <div id="icAlert" class="alert hidden"></div>

    <button id="semakBtn" class="btn btn-primary btn-block">🔍 Semak</button>

    <!-- Student found display -->
    <div id="studentFound" class="student-found hidden">
      <div style="font-size:.75rem;color:#15803d;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">✓ Murid Dijumpai</div>
      <div class="name" id="foundName">—</div>
      <div class="meta" id="foundMeta">—</div>
      <button id="proceedBtn" class="btn btn-primary btn-block" style="margin-top:10px;">Teruskan ➜</button>
    </div>
  </div>

  <!-- FORM -->
  <div id="formCard" class="card hidden">
    <h2>📝 Laporan Ketidakhadiran</h2>

    <div class="pre-info">
      <div style="font-size:.75rem;color:#15803d;font-weight:600;">Anak:</div>
      <div style="font-weight:700;color:#15803d;" id="formStudentName">—</div>
      <div style="font-size:.8rem;color:#374151;" id="formClassCode">—</div>
      <button id="changeStudentBtn" class="btn btn-outline" style="margin-top:8px;font-size:.78rem;padding:6px 12px;">↺ Tukar anak</button>
    </div>

    <div class="checkbox-row">
      <input id="singleDayCheck" type="checkbox" checked />
      <label for="singleDayCheck">Sehari sahaja (hari ini)</label>
    </div>

    <div id="dateRangeWrap" class="date-range hidden">
      <div>
        <label for="dateStart">Tarikh Mula</label>
        <input id="dateStart" type="date" />
      </div>
      <div>
        <label for="dateEnd">Tarikh Tamat</label>
        <input id="dateEnd" type="date" />
      </div>
    </div>
    <div id="singleDayInfo" class="hint">Tarikh hari ini akan digunakan secara automatik.</div>

    <label for="reasonSelect">Sebab Ketidakhadiran</label>
    <select id="reasonSelect">
      <option value="">— Sila pilih sebab —</option>
      <option value="Aktiviti Luar Sekolah">1. Aktiviti Luar Sekolah</option>
      <option value="Bencana Alam">2. Bencana Alam</option>
      <option value="Ancaman Keselamatan">3. Ancaman Keselamatan</option>
      <option value="Masalah Keluarga">4. Masalah Keluarga</option>
      <option value="Masalah Peribadi">5. Masalah Peribadi</option>
      <option value="Kebenaran Guru Besar">6. Kebenaran Guru Besar</option>
      <option value="Tiada Sebab">7. Tiada Sebab</option>
      <option value="Masalah Kesihatan">8. Masalah Kesihatan</option>
    </select>

    <label>Bukti Ketidakhadiran (gambar / PDF / dokumen)</label>
    <label class="file-label" id="fileLabel">
      <input id="evidenceFile" type="file" accept="image/*,application/pdf,.doc,.docx" />
      <div id="fileLabelText">
        <div style="font-size:1.3rem;">📎</div>
        <div style="font-size:.85rem;color:#6b7280;margin-top:4px;">Klik untuk pilih fail (maks 5MB)</div>
      </div>
    </label>
    <div class="hint">Diterima: gambar (jpg/png/dll), PDF, atau dokumen Word.</div>

    <div id="formAlert" class="alert hidden"></div>

    <button id="submitBtn" class="btn btn-primary btn-block">Hantar Laporan</button>
  </div>
</main>

<div id="toast" class="toast hidden"></div>

<!--
  ============================================================
  SETUP (Firebase Console — sekali sahaja):
  ============================================================
  1. Project: sk-sri-aman-database
     - Storage > Rules: benarkan write tanpa auth tetapi dengan
       had saiz (5 MB) + content-type whitelist (lihat rules
       dalam README/repo).

  2. Project: kehadiran-murid-6ece0
     - Realtime Database kekal public (tiada auth).
     - Path: studentIC/{ic} = { name, classCode }
     - Path: absenceReports/{classCode}/{reportId}

  Parent app tidak guna Firebase Auth — sesiapa boleh buka,
  parent hanya perlu masukkan IC anak untuk identify diri.
============================================================
-->

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
(function () {
  'use strict';

  // ============ Firebase init ============
  const dbConfig = {
    apiKey: "AIzaSyDbCgDz2vK2BZUpwM3iDWJcPQSptVcNkv4",
    authDomain: "kehadiran-murid-6ece0.firebaseapp.com",
    databaseURL: "https://kehadiran-murid-6ece0-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kehadiran-murid-6ece0",
    storageBucket: "kehadiran-murid-6ece0.firebasestorage.app",
    messagingSenderId: "223849234784",
    appId: "1:223849234784:web:e1471ded7ea17ba60bde05",
    measurementId: "G-4DY138HKTW"
  };
  const storageConfig = {
    apiKey: "AIzaSyBSWbXoKgQt1E8xvJa9zaKyw3e9V_EMxAE",
    authDomain: "sk-sri-aman-database.firebaseapp.com",
    databaseURL: "https://sk-sri-aman-database-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sk-sri-aman-database",
    storageBucket: "sk-sri-aman-database.firebasestorage.app",
    messagingSenderId: "810640165554",
    appId: "1:810640165554:web:b3ad2dc6f1583ec2a657ab",
    measurementId: "G-EW575JGKQR"
  };

  const primaryApp = firebase.initializeApp(dbConfig);
  const storageApp = firebase.initializeApp(storageConfig, 'storageApp');

  const db = primaryApp.database();
  const storage = storageApp.storage();

  const MAX_FILE_BYTES = 5 * 1024 * 1024;

  // ============ DOM refs ============
  const initLoading = document.getElementById('initLoading');
  const icCard = document.getElementById('icCard');
  const formCard = document.getElementById('formCard');
  const icInput = document.getElementById('icInput');
  const semakBtn = document.getElementById('semakBtn');
  const icAlert = document.getElementById('icAlert');
  const studentFound = document.getElementById('studentFound');
  const foundName = document.getElementById('foundName');
  const foundMeta = document.getElementById('foundMeta');
  const proceedBtn = document.getElementById('proceedBtn');

  const formStudentName = document.getElementById('formStudentName');
  const formClassCode = document.getElementById('formClassCode');
  const changeStudentBtn = document.getElementById('changeStudentBtn');
  const singleDayCheck = document.getElementById('singleDayCheck');
  const dateRangeWrap = document.getElementById('dateRangeWrap');
  const singleDayInfo = document.getElementById('singleDayInfo');
  const dateStart = document.getElementById('dateStart');
  const dateEnd = document.getElementById('dateEnd');
  const reasonSelect = document.getElementById('reasonSelect');
  const evidenceFile = document.getElementById('evidenceFile');
  const fileLabel = document.getElementById('fileLabel');
  const fileLabelText = document.getElementById('fileLabelText');
  const formAlert = document.getElementById('formAlert');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');

  // ============ State ============
  let currentStudent = null; // { ic, name, classCode }

  // ============ Helpers ============
  function showToast(msg, ms = 2800) {
    toast.textContent = msg;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), ms);
  }
  function showAlert(el, msg, type) {
    el.textContent = msg;
    el.className = 'alert alert-' + type;
    el.classList.remove('hidden');
  }
  function hideAlert(el) { el.classList.add('hidden'); }
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ============ Init ============
  function init() {
    initLoading.classList.add('hidden');
    icCard.classList.remove('hidden');
    setTimeout(() => icInput.focus(), 100);
  }
  init();

  // ============ IC input behaviour ============
  icInput.addEventListener('input', () => {
    // Strip non-digits, limit to 12
    icInput.value = icInput.value.replace(/\D/g, '').slice(0, 12);
    // Hide any previous found-state when user types new IC
    if (studentFound.classList.contains('hidden')) return;
    studentFound.classList.add('hidden');
  });
  icInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      doSemak();
    }
  });
  semakBtn.addEventListener('click', doSemak);

  async function doSemak() {
    hideAlert(icAlert);
    studentFound.classList.add('hidden');

    const ic = icInput.value.trim();
    if (!ic) return showAlert(icAlert, 'Sila masukkan nombor IC.', 'error');
    if (ic.length !== 12 || !/^\d{12}$/.test(ic)) {
      return showAlert(icAlert, 'IC mesti 12 digit (nombor sahaja, tanpa sengkang).', 'error');
    }

    semakBtn.disabled = true;
    semakBtn.innerHTML = '<span class="spinner"></span> Mencari...';

    try {
      const snap = await db.ref('studentIC/' + ic).once('value');
      const record = snap.val();
      if (!record || !record.name || !record.classCode) {
        showAlert(icAlert, 'IC tidak ditemui dalam sistem. Sila pastikan IC anak betul, atau hubungi pihak sekolah.', 'error');
        return;
      }

      currentStudent = { ic, name: record.name, classCode: record.classCode };
      foundName.textContent = record.name;
      foundMeta.textContent = 'Kelas: ' + record.classCode;
      studentFound.classList.remove('hidden');
    } catch (err) {
      console.error(err);
      showAlert(icAlert, 'Ralat menyemak: ' + (err.message || err.code), 'error');
    } finally {
      semakBtn.disabled = false;
      semakBtn.textContent = '🔍 Semak';
    }
  }

  // ============ Proceed to form ============
  proceedBtn.addEventListener('click', () => {
    if (!currentStudent) return;
    formStudentName.textContent = currentStudent.name;
    formClassCode.textContent = 'Kelas: ' + currentStudent.classCode;
    icCard.classList.add('hidden');
    formCard.classList.remove('hidden');
  });

  changeStudentBtn.addEventListener('click', () => {
    formCard.classList.add('hidden');
    icCard.classList.remove('hidden');
    icInput.value = '';
    studentFound.classList.add('hidden');
    hideAlert(icAlert);
    currentStudent = null;
    setTimeout(() => icInput.focus(), 100);
  });

  // ============ Date toggle ============
  singleDayCheck.addEventListener('change', () => {
    if (singleDayCheck.checked) {
      dateRangeWrap.classList.add('hidden');
      singleDayInfo.classList.remove('hidden');
    } else {
      dateRangeWrap.classList.remove('hidden');
      singleDayInfo.classList.add('hidden');
      const t = todayKey();
      if (!dateStart.value) dateStart.value = t;
      if (!dateEnd.value) dateEnd.value = t;
    }
  });

  // ============ File picker ============
  evidenceFile.addEventListener('change', () => {
    const file = evidenceFile.files[0];
    if (!file) {
      fileLabel.classList.remove('has-file');
      fileLabelText.innerHTML = '<div style="font-size:1.3rem;">📎</div><div style="font-size:.85rem;color:#6b7280;margin-top:4px;">Klik untuk pilih fail (maks 5MB)</div>';
      return;
    }
    if (file.size > MAX_FILE_BYTES) {
      showAlert(formAlert, 'Fail terlalu besar. Maksimum 5 MB. Saiz fail anda: ' + (file.size / 1024 / 1024).toFixed(1) + ' MB.', 'error');
      evidenceFile.value = '';
      fileLabel.classList.remove('has-file');
      return;
    }
    hideAlert(formAlert);
    fileLabel.classList.add('has-file');
    fileLabelText.innerHTML = '<div style="font-size:1.3rem;">✅</div><div class="file-name">' + escapeHtml(file.name) + '</div><div style="font-size:.75rem;color:#6b7280;margin-top:2px;">' + (file.size / 1024).toFixed(0) + ' KB</div>';
  });

  // ============ Submit ============
  submitBtn.addEventListener('click', submitReport);

  async function submitReport() {
    hideAlert(formAlert);

    if (!currentStudent) {
      return showAlert(formAlert, 'Maklumat anak hilang. Sila semak IC semula.', 'error');
    }

    const reason = reasonSelect.value;
    const file = evidenceFile.files[0];

    if (!reason) return showAlert(formAlert, 'Sila pilih sebab ketidakhadiran.', 'error');
    if (!file) return showAlert(formAlert, 'Sila lampirkan bukti ketidakhadiran.', 'error');

    let startDate, endDate;
    if (singleDayCheck.checked) {
      startDate = endDate = todayKey();
    } else {
      startDate = dateStart.value;
      endDate = dateEnd.value;
      if (!startDate || !endDate) return showAlert(formAlert, 'Sila pilih tarikh mula dan tamat.', 'error');
      if (endDate < startDate) return showAlert(formAlert, 'Tarikh tamat mesti selepas atau sama dengan tarikh mula.', 'error');
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Menghantar...';

    try {
      const classCode = currentStudent.classCode;
      const reportRef = db.ref('absenceReports/' + classCode).push();
      const reportId = reportRef.key;

      // Upload to Storage
      const safeFilename = file.name.replace(/[^\w.\-]/g, '_');
      const storagePath = 'absenceEvidence/' + classCode + '/' + reportId + '/' + safeFilename;
      const fileRef = storage.ref(storagePath);
      const uploadSnap = await fileRef.put(file, { contentType: file.type });
      const evidenceUrl = await uploadSnap.ref.getDownloadURL();

      // Write report
      const reportData = {
        studentName: currentStudent.name,
        studentIC: currentStudent.ic,
        reason: reason,
        dateStart: startDate,
        dateEnd: endDate,
        evidenceUrl: evidenceUrl,
        evidenceFilename: file.name,
        evidenceContentType: file.type || 'application/octet-stream',
        evidenceStoragePath: storagePath,
        status: 'pending',
        submittedAt: firebase.database.ServerValue.TIMESTAMP,
        reviewedAt: null,
        reviewedBy: null
      };
      await reportRef.set(reportData);

      showToast('✅ Laporan berjaya dihantar. Guru kelas akan semak.');
      resetForm();
    } catch (err) {
      console.error(err);
      showAlert(formAlert, 'Gagal menghantar laporan: ' + (err.message || err.code || 'ralat tidak diketahui'), 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Hantar Laporan';
    }
  }

  function resetForm() {
    singleDayCheck.checked = true;
    dateRangeWrap.classList.add('hidden');
    singleDayInfo.classList.remove('hidden');
    dateStart.value = '';
    dateEnd.value = '';
    reasonSelect.value = '';
    evidenceFile.value = '';
    fileLabel.classList.remove('has-file');
    fileLabelText.innerHTML = '<div style="font-size:1.3rem;">📎</div><div style="font-size:.85rem;color:#6b7280;margin-top:4px;">Klik untuk pilih fail (maks 5MB)</div>';

    // Kembali ke IC screen selepas submit, supaya parent boleh laporkan anak lain juga
    setTimeout(() => {
      formCard.classList.add('hidden');
      icCard.classList.remove('hidden');
      icInput.value = '';
      studentFound.classList.add('hidden');
      currentStudent = null;
    }, 1500);
  }

})();
</script>
</body>
</html>
